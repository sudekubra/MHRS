<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHRS | Doktor Paneli</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <!-- Üst Menü -->
    <nav class="navbar">
        <a href="#" class="navbar-brand">
            <span class="material-icons">health_and_safety</span>
            E-Randevu <span style="font-size: 1rem; color: var(--text-muted); font-weight: 400; margin-left:10px;">| Doktor Portalı</span>
        </a>
        <div class="user-info">
            <div style="display: flex; flex-direction: column; text-align: right;">
                <span class="name" id="doctorNameDisplay">Doktor Adı</span>
                <span class="text-muted" id="doctorDetailsDisplay" style="font-size: 0.85rem; font-weight: 500;">Hastane - Bölüm</span>
            </div>
            <button class="btn btn-outline" id="logoutBtn">
                <span class="material-icons" style="font-size: 1.2rem;">logout</span>
                Çıkış Yap
            </button>
        </div>
    </nav>

    <!-- Ana İçerik -->
    <div class="container">
        
        <!-- Bekleyen Talepler -->
        <div class="card mt-4 mb-4" style="border-left: 4px solid var(--warning);">
            <h2 style="color: var(--warning-text); display: flex; align-items: center; gap: 0.5rem;">
                <span class="material-icons">hourglass_empty</span>
                Bekleyen Randevu Talepleri
            </h2>
            <div id="pendingList" style="margin-top: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
                <!-- JS ile Doldurulacak -->
            </div>
        </div>

        <!-- Onaylanmış Randevular (Takvim/Liste) -->
        <div class="card" style="border-left: 4px solid var(--success);">
            <h2 style="color: var(--success-text); display: flex; align-items: center; gap: 0.5rem;">
                <span class="material-icons">event_available</span>
                Onaylanmış Aktif Randevular
            </h2>
            <div id="acceptedList" style="margin-top: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
                <!-- JS ile Doldurulacak -->
            </div>
        </div>

    </div>

    <!-- Erteleme / Aktarma Modal -->
    <div class="modal-overlay" id="rescheduleModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Randevuyu Başka Tarihe Aktar</h2>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <form id="rescheduleForm">
                <div class="form-group">
                    <label class="form-label" for="rescheduleDate">Yeni Tarih</label>
                    <input type="date" id="rescheduleDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="rescheduleTime">Yeni Saat</label>
                    <select id="rescheduleTime" class="form-control" required>
                        <option value="">Saat Seçiniz</option>
                        <option value="09:00">09:00</option>
                        <option value="09:30">09:30</option>
                        <option value="10:00">10:00</option>
                        <option value="10:30">10:30</option>
                        <option value="11:00">11:00</option>
                        <option value="13:30">13:30</option>
                        <option value="14:00">14:00</option>
                        <option value="14:30">14:30</option>
                        <option value="15:00">15:00</option>
                        <option value="15:30">15:30</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-4">Randevuyu Güncelle</button>
            </form>
        </div>
    </div>

    <!-- Script Dosyaları -->
    <script src="js/data.js"></script>
    <script src="js/doctor.js"></script>
</body>
</html>
